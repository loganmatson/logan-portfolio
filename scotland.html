<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Euro Trip">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Scotland + London + Dublin | July 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --scotland: #2a5c45;
  --scotland-light: #3a7d5e;
  --highland: #6b4c8a;
  --london: #334155;
  --london-light: #475569;
  --dublin: #2d6a4f;
  --dublin-light: #40916c;
  --ocean: #1a6b8a;
  --bg: #f8f6f3;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #5a5a5a;
  --border: #e5e2dd;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lift: 0 8px 24px rgba(0,0,0,0.12);
  --radius: 14px;
  --tab-active: var(--scotland);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --text: #e8e8e8;
    --text-secondary: #999;
    --border: #2a2a2a;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
    --shadow-lift: 0 8px 24px rgba(0,0,0,0.4);
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 80px;
  -webkit-font-smoothing: antialiased;
}
.hero {
  background: linear-gradient(135deg, var(--scotland) 0%, var(--highland) 35%, var(--london) 60%, var(--dublin) 85%, var(--ocean) 100%);
  padding: 60px 20px 30px;
  color: white;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 50%, rgba(255,255,255,0.08) 0%, transparent 60%);
  animation: drift 20s ease-in-out infinite;
}
@keyframes drift {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(30px, -20px); }
}
.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  line-height: 1.2;
  position: relative;
  z-index: 1;
}
.hero .subtitle {
  font-size: 14px;
  opacity: 0.85;
  margin-top: 8px;
  position: relative;
  z-index: 1;
}
.hero .route-pills {
  display: flex;
  gap: 6px;
  margin-top: 16px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}
.route-pill {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(4px);
}
.tabs {
  display: flex;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.tab {
  flex: 1;
  padding: 14px 8px;
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s ease;
}
.tab.active {
  color: var(--tab-active);
  border-bottom-color: var(--tab-active);
}
.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }

/* Day Cards */
.day-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  overflow: hidden;
  transition: box-shadow 0.2s ease;
}
.day-card:active { box-shadow: var(--shadow-lift); }
.day-header {
  padding: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
}
.day-num {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  color: white;
  flex-shrink: 0;
}
.day-header-text h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  line-height: 1.3;
}
.day-header-text .day-date {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.day-chevron {
  margin-left: auto;
  font-size: 18px;
  color: var(--text-secondary);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.day-card.open .day-chevron { transform: rotate(180deg); }
.day-body {
  display: none;
  padding: 0 16px 16px;
}
.day-card.open .day-body { display: block; }
.day-section {
  margin-bottom: 14px;
}
.day-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.day-section p {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}
.hike-toggle {
  display: flex;
  gap: 0;
  margin: 10px 0;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.hike-toggle-btn {
  flex: 1;
  padding: 8px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
  background: var(--card);
  color: var(--text-secondary);
}
.hike-toggle-btn.active {
  background: var(--scotland);
  color: white;
}
.hike-option { display: none; }
.hike-option.active { display: block; }
.link-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.link-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  text-decoration: none;
  color: white;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.link-pill:active {
  transform: scale(0.96);
}
.link-pill.map { background: #4285f4; }
.link-pill.trail { background: var(--scotland); }
.link-pill.food { background: var(--dublin); }
.link-pill.stay { background: var(--highland); }
.link-pill.golf { background: #2d6a4f; }
.link-pill.flight { background: var(--ocean); }
.link-pill.book { background: #92400e; }
.link-pill.view { background: var(--london); }

/* Budget */
.budget-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  overflow: hidden;
}
.budget-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.budget-row:last-child { border-bottom: none; }
.budget-row .cat { flex: 1; }
.budget-row .amt {
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.budget-row .detail {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.budget-total {
  background: var(--scotland);
  color: white;
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  font-weight: 700;
  font-size: 16px;
}
.budget-lever {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.budget-lever h4 {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--dublin);
}
.budget-lever li {
  font-size: 13px;
  line-height: 1.6;
  margin-left: 16px;
  color: var(--text-secondary);
}

/* Packing */
.pack-category {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  overflow: hidden;
}
.pack-cat-header {
  padding: 14px 16px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.pack-cat-header .count {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 500;
}
.pack-items { padding: 0 16px 12px; }
.pack-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  cursor: pointer;
  transition: opacity 0.2s ease;
}
.pack-item:last-child { border-bottom: none; }
.pack-check {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
}
.pack-item.done .pack-check {
  background: var(--scotland);
  border-color: var(--scotland);
}
.pack-item.done .pack-check::after {
  content: '';
  width: 6px;
  height: 10px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg) translate(-1px, -1px);
}
.pack-item.done .pack-label {
  text-decoration: line-through;
  opacity: 0.5;
}

/* Info Tab */
.info-section {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  overflow: hidden;
}
.info-section-header {
  padding: 14px 16px;
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  border-bottom: 1px solid var(--border);
}
.info-row {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  line-height: 1.5;
}
.info-row:last-child { border-bottom: none; }
.info-row strong { font-weight: 700; }
.info-row a {
  color: var(--ocean);
  text-decoration: none;
  font-weight: 500;
}
.currency-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}
.currency-table th {
  text-align: left;
  padding: 8px 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}
.currency-table td {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}
.food-card {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.food-card:last-child { border-bottom: none; }
.food-card .dish { font-weight: 700; font-size: 14px; }
.food-card .desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.weather-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
}
.weather-item {
  flex: 1;
  text-align: center;
  padding: 10px 6px;
  border-radius: 10px;
  background: var(--bg);
}
.weather-item .temp {
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 2px;
}
.weather-item .loc {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
}
.weather-item .cond {
  font-size: 10px;
  color: var(--text-secondary);
  margin-top: 2px;
}
footer {
  text-align: center;
  padding: 20px;
  font-size: 11px;
  color: var(--text-secondary);
}
</style>
</head>

// ============================================================
// INTERACTIONS
// ============================================================
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const tabs = ['itinerary','budget','packing','info'];
  document.querySelectorAll('.tab')[tabs.indexOf(id)].classList.add('active');
  const colors = { itinerary: 'var(--scotland)', budget: 'var(--scotland)', packing: 'var(--highland)', info: 'var(--ocean)' };
  document.documentElement.style.setProperty('--tab-active', colors[id]);
}

function toggleDay(card) {
  if (event.target.closest('.link-pill') || event.target.closest('.hike-toggle-btn')) return;
  card.classList.toggle('open');
}

function toggleHike(btn, dayNum, mode) {
  const parent = btn.closest('.day-section');
  parent.querySelectorAll('.hike-toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  parent.querySelectorAll('.hike-option').forEach(o => o.classList.remove('active'));
  document.getElementById(`hike-${dayNum}-${mode}`).classList.add('active');
}

function togglePack(item, cat, idx) {
  item.classList.toggle('done');
  const isDone = item.classList.contains('done') ? '1' : '0';
  localStorage.setItem(`pack-${cat}-${idx}`, isDone);
  // Update count
  const catEl = item.closest('.pack-category');
  const items = catEl.querySelectorAll('.pack-item');
  const checked = catEl.querySelectorAll('.pack-item.done').length;
  catEl.querySelector('.count').textContent = `${checked}/${items.length}`;
}
